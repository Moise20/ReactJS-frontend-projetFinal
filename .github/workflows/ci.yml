# [LEARN] Même principe que le backend : à chaque push sur main,
# [LEARN] on vérifie que l'appli React compile et que les tests passent.
name: CI — Frontend React

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          # [LEARN] REACT_APP_API_URL est utilisé dans le build pour générer
          # [LEARN] les URLs d'appel API. En CI on met une valeur fictive.
          REACT_APP_API_URL: http://localhost:3301
          CI: false

      - name: Tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          REACT_APP_API_URL: http://localhost:3301
          CI: true

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
